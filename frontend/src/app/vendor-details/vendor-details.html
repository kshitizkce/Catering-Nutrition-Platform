<div class="page">

<nav class="navbar">

<div class="logo">🍽 Smart Catering</div>

<div class="nav-links">

<span (click)="router.navigate(['/home'])">🏠 Home</span>
<span (click)="router.navigate(['/menu'])">📋 Menu</span>
<span (click)="router.navigate(['/profile'])">👤 Account</span>

</div>

</nav>

<div class="vendor-container">

<h1>{{vendorName}}</h1>

<p class="subtitle">
Explore the full menu from this vendor
</p>

<div class="menu-grid">

<div class="menu-card" *ngFor="let item of menu">

<img [src]="item.image">

<h3>{{item.name}}</h3>

<div class="nutrition">

<span>🔥 {{item.calories}} cal</span>
<span>💪 {{item.protein}}</span>
<span>🍞 {{item.carbs}}</span>
<span>🥑 {{item.fat}}</span>

</div>

<p class="price">
${{item.price}}
</p>

<button>Select Meal</button>

</div>

</div>

</div>

</div>
